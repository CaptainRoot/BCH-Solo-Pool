# ============================================================
#  Bitcoin Cash Node – bitcoin.conf
#  Optimiert für Solo-Mining + Block Explorer
# ============================================================

# --- RPC-Zugang ---
server=1
rpcuser=bchuser
rpcpassword=AENDERN_SICHERES_PASSWORT_HIER
rpcallowip=172.28.0.0/16
rpcbind=0.0.0.0
rpcport=8332

# --- Explorer-Pflicht: Transaktionsindex ---
# Ermöglicht Transaktionssuche per TXID im Explorer.
# ⚠️  Wenn der Node bereits ohne txindex synchronisiert wurde:
#     docker compose exec bchn bitcoind -datadir=/data -reindex
#     (dauert mehrere Stunden!)
txindex=1

# --- Performance ---
# RAM-Cache für Blockchain-DB (in MB)
# Empfehlung: 25–50% des verfügbaren RAMs
dbcache=1024

# Weniger Peers = weniger Overhead beim Mining
maxconnections=32

# --- Netzwerk ---
mainnet=1

# --- Logging ---
shrinkdebugfile=1
