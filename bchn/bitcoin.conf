# ============================================================
#  Bitcoin Cash Node – bitcoin.conf
#  Optimiert für lokales Solo-Mining mit bchpool
# ============================================================

# --- RPC-Zugang (nur Docker-internes Netzwerk) ---
server=1
rpcuser=bchuser
rpcpassword=AENDERN_SICHERES_PASSWORT_HIER

# Docker-Bridge-Netzwerk erlauben (172.28.x.x)
rpcallowip=172.28.0.0/16
rpcbind=0.0.0.0
rpcport=8332

# --- Performance ---
# RAM-Cache für die Blockchain-Datenbank (in MB)
# Empfehlung: 25–50% des verfügbaren RAMs
dbcache=1024

# Weniger Peers = weniger Overhead beim Mining
maxconnections=32

# Kein Transaktionsindex nötig
txindex=0

# --- Netzwerk ---
mainnet=1

# --- Logging (minimal) ---
shrinkdebugfile=1
