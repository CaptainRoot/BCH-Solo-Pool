# ============================================================
#  BCH Solo Mining Pool + Block Explorer + ckstats
#  Alle Images werden lokal aus Quellcode gebaut.
#
#  Services:
#    bchn      – Bitcoin Cash Full Node (BCHN v29, Port 8333/8332)
#    bchpool   – Stratum V1 Server für Bitaxe (Port 3333)
#    explorer  – BCH Block Explorer Web-UI (Port 3002)
#    postgres  – PostgreSQL Datenbank für ckstats
#    ckstats   – Mining-Dashboard Web-UI (Port 3000)
#
#  Erster Start:
#    docker compose build --no-cache
#    docker compose up -d
# ============================================================

services:

  # ----------------------------------------------------------
  #  Bitcoin Cash Node (BCHN v29.0.0)
  #  Aus Quellcode: gitlab.com/bitcoin-cash-node
  # ----------------------------------------------------------
  bchn:
    build:
      context: ./bchn
      dockerfile: Dockerfile
      args:
        BCHN_VERSION: "v29.0.0"
    image: bchn-local:v29.0.0
    container_name: bchn
    restart: unless-stopped
    volumes:
      - ./data/bchn:/data
      - ./bchn/bitcoin.conf:/data/bitcoin.conf:ro
    ports:
      - "8333:8333"         # BCH P2P (optional, für bessere Peer-Verbindungen)
    networks:
      mining:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: >
        bitcoin-cli
        -datadir=/data
        -rpcuser=bchuser
        -rpcpassword=AENDERN_SICHERES_PASSWORT_HIER
        getblockchaininfo
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s

  # ----------------------------------------------------------
  #  bchpool – Stratum V1 Server
  #  Aus Quellcode: github.com/dagurval/bchpool
  # ----------------------------------------------------------
  bchpool:
    build:
      context: ./bchpool
      dockerfile: Dockerfile
    image: bchpool-local:latest
    container_name: bchpool
    restart: unless-stopped
    depends_on:
      bchn:
        condition: service_healthy
    volumes:
      - ./bchpool/ckpool.conf:/etc/ckpool/ckpool.conf:ro
      - bchpool-logs:/var/log/ckpool   # Named Volume – geteilt mit ckstats
    ports:
      - "3333:3333"         # Stratum – Bitaxe verbindet sich hier
    networks:
      mining:
        ipv4_address: 172.28.0.20
    command: ["-c", "/etc/ckpool/ckpool.conf"]

  # ----------------------------------------------------------
  #  BCH Block Explorer (bch-rpc-explorer)
  #  Datenbankfrei, direkt per RPC gegen BCHN
  #  Web-UI: http://<host-ip>:3002
  # ----------------------------------------------------------
  explorer:
    build:
      context: ./explorer
      dockerfile: Dockerfile
    image: bch-explorer-local:latest
    container_name: bch-explorer
    restart: unless-stopped
    depends_on:
      bchn:
        condition: service_healthy
    env_file:
      - ./explorer/explorer.env
    ports:
      - "3002:3002"
    networks:
      mining:
        ipv4_address: 172.28.0.30

  # ----------------------------------------------------------
  #  PostgreSQL – Datenbank für ckstats
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ckstats-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: AENDERN_SICHERES_PASSWORT_HIER
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./db/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    networks:
      mining:
        ipv4_address: 172.28.0.40
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  #  ckstats – Mining-Dashboard
  #  Liest ckpool-Logs, zeigt Hashrate, Shares, Best-Diff
  #  Aus Quellcode: github.com/mrv777/ckstats
  #  Web-UI: http://<host-ip>:3000
  # ----------------------------------------------------------
  ckstats:
    build:
      context: ./ckstats
      dockerfile: Dockerfile
    image: ckstats-local:latest
    container_name: ckstats
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      bchpool:
        condition: service_started
    volumes:
      - bchpool-logs:/var/log/ckpool:ro  # Logs von bchpool lesen
    ports:
      - "3000:3000"         # Dashboard Web-UI
    networks:
      mining:
        ipv4_address: 172.28.0.50

volumes:
  bchpool-logs:              # Geteilt zwischen bchpool und ckstats

networks:
  mining:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
